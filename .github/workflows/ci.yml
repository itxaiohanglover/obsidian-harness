name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Run test suite
        run: chmod +x tests/run.sh && ./tests/run.sh

  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install shellcheck
        run: sudo apt-get install -y shellcheck
      - name: Lint install.sh
        run: shellcheck install.sh || true
      - name: Lint tests/run.sh
        run: shellcheck tests/run.sh || true

  markdown-links:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check internal doc links
        run: |
          errors=0
          for f in docs/*.md README.md; do
            # Extract markdown links to local files
            links=$(grep -oP '\[.*?\]\((?!http)(.*?)\)' "$f" 2>/dev/null | grep -oP '\(.*?\)' | tr -d '()' || true)
            for link in $links; do
              if [ ! -f "$link" ] && [ ! -f "docs/$link" ]; then
                echo "BROKEN LINK: $f → $link"
                errors=$((errors+1))
              fi
            done
          done
          if [ $errors -gt 0 ]; then
            echo "$errors broken link(s) found"
            exit 1
          fi
          echo "All internal links valid ✓"
